<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Stats - Olamn FPL Scout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-custom { background-color: #0A2540; }
        .hero-banner { background-color: #0A2540; color: white; padding: 40px 0; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom px-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Olamn FPL Scout</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="recommended.html">Recommendations</a></li>
                    <li class="nav-item"><a class="nav-link" href="watchlist.html">Watchlist</a></li>
                </ul>
                <span class="badge bg-secondary ms-3" id="live-health-badge">Loading...</span>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
    <h2 class="mb-4">Player Statistics</h2>
    
    <div class="row g-2 mb-3">
        <div class="col-md-6">
            <input type="text" id="stats-search" class="form-control" placeholder="Search by name...">
        </div>
        <div class="col-md-6 text-md-end">
            <button class="btn btn-outline-primary filter-btn" onclick="filterByPos('ALL')">ALL</button>
            <button class="btn btn-outline-primary filter-btn" onclick="filterByPos('GKP')">GKP</button>
            <button class="btn btn-outline-primary filter-btn" onclick="filterByPos('DEF')">DEF</button>
            <button class="btn btn-outline-primary filter-btn" onclick="filterByPos('MID')">MID</button>
            <button class="btn btn-outline-primary filter-btn" onclick="filterByPos('FWD')">FWD</button>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Pos</th>
                    <th>Team</th>
                    <th>Pts</th>
                    <th>Price</th>
                    <th>Form</th>
                    <th>Ownership</th>
                </tr>
            </thead>
            <tbody id="stats-table-body">
                </tbody>
        </table>
    </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
